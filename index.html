<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Soberania de Ambientes | Mentoria Estratégica</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #d4af37; --text: #ffffff; }
        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .container { max-width: 600px; padding: 20px; }
        h1 { font-size: 2.5rem; line-height: 1.2; margin-bottom: 20px; }
        p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 40px; }
        .btn { display: inline-block; padding: 18px 35px; background: transparent; border: 1px solid var(--accent); color: var(--accent); text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease; }
        .btn:hover { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ambientes são soberanos.</h1>
        <p>Da engenharia de espaços físicos inteligentes à arquitetura de sistemas digitais. Diagnostico o seu ecossistema atual para definir onde a maestria ainda não foi atingida.</p>
        <a href="https://wa.me/SEUNUMERO?text=Olá, quero submeter meu projeto ao seu diagnóstico." class="btn">Solicitar Diagnóstico Sistêmico</a>
    </div>
</body>
</html>
